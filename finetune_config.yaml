# Nome logico do projeto para rastreabilidade dos artefatos.
project_name: fine_tuning_backend_multimodelo_soja
# Identificador exato do checkpoint a ser carregado.
# Este campo continua obrigatorio mesmo quando model_family estiver definido.
base_model_id: mistralai/Ministral-3-3B-Instruct-2512-BF16
# Caminho para a raiz do dataset de imagens.
dataset_root: ../dataset_kaggle_soja
# Caminho para a run externa que contem os folds ja prontos.
source_experiment_dir: ../ensaio_classif_soja_llm_multimodais/experiments_multimodal/cv_run_ministral-3_3b_20260318_002404
# Pasta raiz onde os artefatos desta implementacao serao gravados.
output_root: outputs
# Conjunto canonico de rotulos esperados pelo pipeline.
label_set:
  - Broken
  - Immature
  - Intact
  - Skin Damaged
  - Spotted

backend:
  # Nome do backend principal a ser usado pela orquestracao.
  # Valores validos hoje: unsloth, transformers.
  name: unsloth
  # Familia de runtime efetiva.
  # Em geral deve acompanhar backend.name, mas fica explicita para auditoria.
  runtime_family: unsloth
  # Familia logica do modelo para regras de compatibilidade.
  # Valores recomendados neste projeto:
  # - ministral3
  # - llama3
  # - llama4
  # - qwen25
  # - qwen3
  # - qwen25vl
  # - qwen3vl
  # - gemma3
  # - deepseek_vl
  # - deepseek_ocr
  # - phi3_vision
  model_family: ministral3
  # Modo de quantizacao principal.
  # Valores praticos mais usados:
  # - qlora_4bit
  # - lora_fp16
  # - full_fp16
  quantization_mode: qlora_4bit
  # Indica se a execucao deve tentar Unsloth primeiro.
  enable_unsloth: true
  # Permite fallback para transformers quando necessario.
  enable_transformers_fallback: true
  # Perfil extra de dependencias recomendado para o ambiente.
  # Exemplos:
  # - unsloth-cu124
  # - unsloth-cu121
  # - transformers-cu124
  # - transformers-cu121
  # - transformers-cpu
  extra_requirements_profile: unsloth-cu124

