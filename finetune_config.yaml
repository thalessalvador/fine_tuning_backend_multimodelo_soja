training:
  seed: 42
  num_folds: 5
  num_epochs: 1
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  gradient_accumulation_steps: 8
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  eval_strategy: epoch
  logging_steps: 10
  max_new_tokens: 16
  num_workers: 0
  save_total_limit: 2
  train_prompt: "Classifique este grao de soja em exatamente uma das classes: Broken, Immature, Intact, Skin Damaged, Spotted. Responda apenas com o rotulo."

memory:
  load_in_4bit: true
  gradient_checkpointing: true
  bf16_if_available: true
  max_image_size: 448

lora:
  enabled: true
  r: 8
  alpha: 16
  dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

pilot_mode:
  enabled: false
  max_train_samples_per_fold: 256
  max_val_samples_per_fold: 64
  max_test_samples_per_fold: 64
